<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Knowledge OS — J. Cameron Davis</title>
<meta name="description" content="A live semantic map of the Blue Hen knowledge base — real embedding-space positions, PCA to 2D. Distance is meaning.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="stylesheet" href="/assets/site.css">
<style>
  .k-shell { max-width: 1180px; margin: 0 auto; padding: 5vh 20px 6vh; }
  .k-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .k-head a.back { font: 700 13px var(--bh-font-mono); color: var(--bh-clay); text-decoration: none; }
  .k-explain { color: var(--bh-muted); font-size: .92rem; max-width: 70ch; margin-bottom: 18px; }
  .k-explain a { color: var(--bh-clay); }
  .k-filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
  .k-search {
    min-height: 36px; min-width: 180px; padding: 0 12px;
    background: var(--bh-surface-raised); color: var(--bh-text);
    border: 2px solid var(--bh-card-border); border-radius: 10px;
    font: 13px var(--bh-font-body);
  }
  .k-chip {
    min-height: 36px; padding: 0 13px; cursor: pointer;
    font: 700 12px var(--bh-font-body); color: var(--bh-text);
    background: var(--bh-surface); border: 2px solid var(--bh-card-border);
    border-radius: 10px; box-shadow: 3px 3px 0 var(--bh-ink-shadow);
    transition: transform 120ms, box-shadow 120ms, background 120ms;
  }
  .k-chip:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--bh-ink-shadow); }
  .k-chip[aria-pressed="true"] { background: var(--bh-clay); color: var(--bh-on-accent); transform: translate(3px,3px); box-shadow: none; }
  .k-body { display: flex; gap: 20px; align-items: flex-start; }
  .k-map-frame { flex: 1; min-width: 0; }
  #kmap { width: 100%; height: min(68vh, 620px); display: block; border-radius: 6px; background: var(--bh-inset); touch-action: none; cursor: grab; }
  .k-unreachable { padding: 30px 10px; text-align: center; color: var(--bh-muted); }
  .k-panel {
    width: 320px; flex-shrink: 0; padding: 16px 18px;
    background: var(--bh-surface); border: 2px solid var(--bh-card-border);
    border-radius: 4px 16px 6px 14px; box-shadow: var(--block-x) var(--block-y) 0 var(--bh-ink-shadow);
    max-height: min(68vh, 620px); overflow-y: auto; position: relative;
  }
  .k-panel h3 { font-family: var(--bh-font-display); font-size: 1.1rem; font-weight: 500; padding-right: 22px; }
  .k-panel .k-tags { margin: 8px 0; display: flex; flex-wrap: wrap; gap: 6px; }
  .k-tag { font: 600 10.5px var(--bh-font-mono); color: var(--bh-clay); background: var(--bh-inset); border-radius: 6px; padding: 2px 7px; }
  .k-note-body p { color: var(--bh-text-secondary); font-size: .92rem; margin-top: 10px; }
  .k-note-loading, .k-note-empty, .k-note-error { color: var(--bh-muted); font-size: .9rem; }
  .k-source { display: inline-block; margin-top: 14px; font: 700 12px var(--bh-font-mono); color: var(--bh-clay); }
  .k-concepts { margin-top: 14px; }
  .k-concepts h4 { font: 700 10.5px/1 var(--bh-font-body); letter-spacing: .1em; text-transform: uppercase; color: var(--bh-clay); margin-bottom: 8px; }
  .wikilink, .wikilink-plain { text-decoration: underline; text-underline-offset: 2px; }
  .wikilink { color: var(--bh-clay); cursor: pointer; font-weight: 600; }
  .wikilink-plain { color: var(--bh-muted); }
  .k-close { position: absolute; top: 12px; right: 14px; background: none; border: 0; cursor: pointer; font-size: 18px; color: var(--bh-muted); line-height: 1; display: none; }
  @media (max-width: 820px) {
    .k-body { flex-direction: column; }
    .k-panel {
      display: none; position: fixed; left: 0; right: 0; bottom: 0; width: auto;
      max-height: 60vh; border-radius: 16px 16px 0 0; z-index: 50;
      transform: translateY(100%); transition: transform 220ms cubic-bezier(.16,1,.3,1);
    }
    .k-panel.open { display: block; transform: translateY(0); }
    .k-close { display: block; }
  }
</style>
</head>
<body>
<main class="k-shell">
  <div class="k-head">
    <h1 style="font-size:clamp(1.8rem,5vw,2.6rem)">The Knowledge OS</h1>
    <a class="back" href="/">← jcamd.com</a>
  </div>
  <p class="k-explain" id="k-explain">reading the knowledge base…</p>

  <div class="k-filters" id="kfilters"></div>

  <div class="k-body">
    <div class="screen-frame k-map-frame">
      <canvas id="kmap"></canvas>
    </div>
    <aside class="k-panel" id="kpanel">
      <p class="k-note-empty">Select a node to read its note.</p>
    </aside>
  </div>
</main>
<script src="/assets/knowledge.js" defer></script>
</body>
</html>
